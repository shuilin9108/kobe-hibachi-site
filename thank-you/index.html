<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thank You | Kobe Hibachi Catering</title>

<link rel="stylesheet" href="../style.css">

<script async src="https://www.googletagmanager.com/gtag/js?id=G-XE2J1LCPZ1"></script>

<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-XE2J1LCPZ1');
gtag('config', 'AW-18087654321');

window.onload = function(){
    hydrate();
};

function read(key){
    try{
        return JSON.parse(sessionStorage.getItem(key));
    }catch{
        return null;
    }
}

function money(v){
    return "$" + Number(v||0).toFixed(2);
}

function set(id,val){
    const el=document.getElementById(id);
    if(el) el.innerText=val;
}

function hydrate(){
    const draft = read("kobeBookingDraft") || {};
    const result = read("kobeBookingResult") || {};

    const customer = draft.customer || {};
    const event = draft.event || {};
    const pricing = draft.pricingSnapshot || {};
    const shared = draft.shared || {};

    const total = pricing.totalPrice || 0;
    const deposit = pricing.deposit || 50;

    set("bookingId", result.bookingId || "Pending");
    set("name", customer.firstName + " " + customer.lastName);
    set("phone", customer.phone);
    set("date", event.date);
    set("time", event.time);
    set("guests", event.guestCount);
    set("total", money(total));
    set("deposit", money(deposit));
    set("remain", money(total - deposit));
    set("promo", shared.promoCode || "None");
}
</script>

<style>
body{
    font-family:sans-serif;
    background:#111;
    color:#fff;
    padding:40px;
}

.card{
    max-width:700px;
    margin:auto;
    background:#fff;
    color:#000;
    padding:30px;
    border-radius:20px;
}

h1{
    text-align:center;
}

.box{
    margin-top:20px;
    padding:15px;
    border:1px solid #ddd;
    border-radius:10px;
}

.btn{
    display:block;
    margin-top:20px;
    padding:15px;
    text-align:center;
    background:#22c55e;
    color:#fff;
    border-radius:999px;
    text-decoration:none;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

<h1>Thank You</h1>

<p style="text-align:center;">Your booking request was submitted.</p>

<div class="box">
Booking ID: <b id="bookingId"></b>
</div>

<div class="box">
Name: <b id="name"></b><br>
Phone: <b id="phone"></b><br>
Date: <b id="date"></b><br>
Time: <b id="time"></b><br>
Guests: <b id="guests"></b>
</div>

<div class="box">
Total: <b id="total"></b><br>
Deposit: <b id="deposit"></b><br>
Remaining: <b id="remain"></b><br>
Promo: <b id="promo"></b>
</div>

<a 
href="https://buy.stripe.com/9B6eVeabl5qXfbQ85Y2kw00"
target="_blank"
class="btn">
Pay Deposit Now
</a>

<div style="margin-top:20px; display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">

    <a href="../" class="btn" style="background:#111;">
        Back to Home
    </a>

    <a href="../booking/" class="btn" style="background:#f59e0b;">
        Book Another Event
    </a>

</div>
</div>

</body>
</html>
